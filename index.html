<!DOCTYPE html>
<html lang="en">
<head>
	<title>Bengaluru Metro Map</title>
	<meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1.0, user-scalable=yes">
    <meta charset="utf-8">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
	<!-- Whole page Google Map (with Locations of each item)-->
	<div id="map"></div>
	<!-- Hamburger menu that opens up the Sidebar-->
	<svg class="menu-icon" onclick="openview()" style="cursor:pointer" viewBox="0 0 24 24" width="32" height="32" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
	<!-- Sidebar showing Heading, Filter box and List of items-->
	<div id="sidebar">
		<div class="heading">
			Namma Metro Map
            <svg class="close-icon" onclick="closeview()" style="cursor:pointer" viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
		</div>
		<div class="tabs">
            <button class="tab-btn" data-bind="click: function() { activeTab('explore'); }, css: { active: activeTab() === 'explore' }">All</button>
            <button class="tab-btn" data-bind="click: function() { activeTab('purple'); }, css: { active: activeTab() === 'purple' }">Purple</button>
            <button class="tab-btn" data-bind="click: function() { activeTab('green'); }, css: { active: activeTab() === 'green' }">Green</button>
            <button class="tab-btn" data-bind="click: function() { activeTab('yellow'); }, css: { active: activeTab() === 'yellow' }">Yellow</button>
        </div>
        
        <div class="tab-content">
		    <input type="text" class="filter" data-bind="textInput: query" placeholder="Search stations">
		    <ul data-bind="foreach: filterResults">
			    <li data-bind="text: name, click: $parent.displayInfo"></li>
		    </ul>
        </div>
        
        <div class="footer">
            Built by <a href="https://manubhargav.github.io" target="_blank" rel="noopener noreferrer">Manu Bhargav</a>
        </div>
	</div>
	<!-- Knockout JavaSciprt library -->
	<script src="js/knockout-3.4.1.js"></script>
	<!-- jQuery JavaScript libray -->
	<script src="js/jquery-3.1.1.min.js"></script>
	<!-- Custom JavaScript for App functionality -->
	<script src="js/locations.js"></script>
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<script src="js/app.js"></script>
</body>
</html>
